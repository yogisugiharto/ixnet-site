<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DE-CIX Indonesia · Zabbix Quick Links + IP (JKT/ASE/MAPS)</title>
  <style>
    :root { --bg:#0b1020; --line:#1f2a4d; --text:#e5e7eb; --muted:#9ca3af; --chip:#11183a; }
    body { margin:0; font:14px/1.35 system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,Noto Sans,Arial,sans-serif; background:linear-gradient(180deg,#0b1020 0%,#0b1228 100%); color:var(--text); }
    header { position:sticky; top:0; z-index:10; background:rgba(11,16,32,.9); backdrop-filter:saturate(150%) blur(8px); border-bottom:1px solid var(--line); }
    .container { max-width:1320px; margin:0 auto; padding:16px; }
    h1 { margin:8px 0 12px; font-size:22px; font-weight:800; }
    .subtitle { color:var(--muted); font-size:13px; margin-bottom:8px; }
    .toolbar { display:grid; gap:10px; grid-template-columns: 1fr auto auto auto auto auto; align-items:center; }
    .search { display:flex; gap:8px; align-items:center; background:#0f1736; border:1px solid #203056; border-radius:10px; padding:8px 10px; }
    .search input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-size:14px; }
    .btn { background:linear-gradient(180deg,#1b2650,#152046); color:var(--text); border:1px solid #2a3a72; border-radius:10px; padding:8px 12px; cursor:pointer; text-decoration:none; }
    .btn:hover { filter:brightness(1.06); }
    .btn.secondary { background:#182044; border-color:#29346c; }
    table { width:100%; border-collapse:collapse; margin-top:12px; }
    thead { position:sticky; top:90px; background:#0f1633; box-shadow:0 1px 0 var(--line); z-index:5; }
    th, td { padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
    th { text-align:left; font-weight:700; color:#bcd0ff; font-size:12px; letter-spacing:.02em; }
    tr:hover td { background:rgba(32,41,80,.25); }
    .links { display:flex; flex-wrap:wrap; gap:6px; }
    .chip { display:inline-flex; align-items:center; gap:6px; border:1px solid #33407a; background:var(--chip); color:#d1d5db; padding:6px 10px; border-radius:999px; font-size:12px; text-decoration:none; }
    .chip span.kind { color:#93c5fd; font-weight:700; }
    .chip .copy { opacity:.7; border:none; background:transparent; color:inherit; cursor:pointer; }
    .chip.disabled { opacity:.4; pointer-events:none; }
    code { background:#11183a; padding:2px 6px; border-radius:6px; }
    .footer { color:var(--muted); font-size:12px; padding:16px; text-align:center; }
    .hide-md { display: table-cell; }
    @media (max-width: 1100px) {
      .toolbar { grid-template-columns: 1fr; row-gap:8px; }
      thead { top: 162px; }
     .hide-md { display: none; }

     /* === Force kolom Access Port tetap tampil di mobile === */
      thead th:nth-child(5),
      tbody td:nth-child(5) { display: table-cell !important; }
    }
</style>
  <script defer src="app.js"></script>
</head>
<body>
  <header>
    <div class="container">
      <h1>DE‑CIX Indonesia · Zabbix Quick Links + IP (JKT / ASE / MAPS)</h1>
      <div class="subtitle">Import CSV/JSON → render tabel. Chip link (ACCESS/JKT/ASEAN/MAPS). Copy IP per kolom. Save/Load ke Server & Local.</div>
      <div class="toolbar">
        <div class="search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M15.5 15.5L21 21" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/><circle cx="11" cy="11" r="7" stroke="#9ca3af" stroke-width="2"/></svg>
          <input id="q" placeholder="Cari: asn:150279 · brand:LNS · has:JKT · ip:49.213" />
        </div>
        <label class="btn secondary" for="file">Import CSV/JSON… <input id="file" type="file" accept=".csv,.json" hidden /></label>
        <button class="btn" id="btn-save-server">💾 Save (Server)</button>
        <button class="btn" id="btn-load-server">⤓ Load (Server)</button>
        <button class="btn" id="btn-save-local">💾 Save (Local)</button>
        <button class="btn" id="btn-load-local">⤓ Load (Local)</button>
        <a class="btn" href="global.html">➡ Global Account</a>
		<button class="btn" id="btn-export">⬇ Export CSV</button>
      </div>
    </div>
  </header>
  <main class="container">
    <table id="tbl"><thead><tr>
      <th class="hide-md">No</th><th>Company</th><th class="hide-md">Brand</th><th>ASN</th><th class="hide-md">Access Port</th><th>Links</th><th>IP JKT</th><th>IP ASE</th><th>IP MAPS</th>
    </tr></thead><tbody></tbody></table>
  </main>
  <div class="footer">Express API via Nginx proxy · © Yogi</div>
</body>
</html>
